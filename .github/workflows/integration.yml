name: Integration

on:
  workflow_dispatch:
    inputs:
      domain:
        description: Domain to use for live passive source checks
        required: false
        default: cloudflare.com

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    env:
      SUBSCAN_RUN_LIVE_TESTS: "1"
      SUBSCAN_LIVE_DOMAIN: ${{ inputs.domain }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run live integration tests
        run: go test -tags=integration ./...
