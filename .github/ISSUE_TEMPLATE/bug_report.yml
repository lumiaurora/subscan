name: Bug report
description: Report a defect, regression, or incorrect result.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail to reproduce the problem.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `subscan --version`
      placeholder: subscan 1.1.0 commit=...
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: Operating system and architecture
      placeholder: macOS arm64, Linux amd64, Windows amd64
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      description: Exact command you ran
      placeholder: subscan -d example.com --resolve --json --output results.json
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or sample output
      description: Paste terminal output, JSON snippets, or relevant errors
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Relevant environment notes, source behavior, or reproduction details
