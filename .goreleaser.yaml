version: 2

project_name: subscan

before:
  hooks:
    - go test ./...

builds:
  - id: subscan
    binary: subscan
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/lumiaurora/subscan/internal/buildinfo.version={{ .Version }} -X github.com/lumiaurora/subscan/internal/buildinfo.commit={{ .Commit }} -X github.com/lumiaurora/subscan/internal/buildinfo.date={{ .Date }} -X github.com/lumiaurora/subscan/internal/buildinfo.builtBy=goreleaser

archives:
  - id: default
    ids:
      - subscan
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - config.example.json

checksum:
  name_template: checksums.txt

sboms:
  - id: archives
    artifacts: archive
    ids:
      - default

notarize:
  macos:
    - enabled: '{{ and (isEnvSet "MACOS_SIGN_P12") (isEnvSet "MACOS_SIGN_PASSWORD") (isEnvSet "MACOS_NOTARY_KEY") (isEnvSet "MACOS_NOTARY_KEY_ID") (isEnvSet "MACOS_NOTARY_ISSUER_ID") }}'
      ids:
        - subscan
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: lumiaurora
    name: subscan

snapshot:
  version_template: "{{ incpatch .Version }}-next"

homebrew_casks:
  - repository:
      owner: lumiaurora
      name: homebrew-tap
      token: "{{ .Env.PACKAGE_PUBLISH_TOKEN }}"
      branch: main
    binaries:
      - subscan
    homepage: https://github.com/lumiaurora/subscan
    description: Passive subdomain enumeration CLI for OSINT and security research
    license: MIT
    url:
      verified: github.com/lumiaurora/subscan/
    caveats: |
      subscan is currently distributed as an unsigned binary.
      If Gatekeeper blocks execution after install, rerun:
        xattr -dr com.apple.quarantine "$(brew --prefix)/Caskroom/subscan/latest/subscan"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/subscan"]
          end
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com

scoops:
  - repository:
      owner: lumiaurora
      name: scoop-bucket
      token: "{{ .Env.PACKAGE_PUBLISH_TOKEN }}"
      branch: main
    homepage: https://github.com/lumiaurora/subscan
    description: Passive subdomain enumeration CLI for OSINT and security research
    license: MIT
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
