version: 2

project_name: subscan

before:
  hooks:
    - go test ./...

builds:
  - id: subscan
    binary: subscan
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/lumiaurora/subscan/internal/buildinfo.version={{ .Version }} -X github.com/lumiaurora/subscan/internal/buildinfo.commit={{ .Commit }} -X github.com/lumiaurora/subscan/internal/buildinfo.date={{ .Date }} -X github.com/lumiaurora/subscan/internal/buildinfo.builtBy=goreleaser

archives:
  - id: default
    ids:
      - subscan
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - config.example.json

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: lumiaurora
    name: subscan

snapshot:
  version_template: "{{ incpatch .Version }}-next"
